groups:
  # Worker health alerts
  - name: worker-sidecar-health
    rules:
      - alert: SIEWorkerDown
        expr: kube_pod_container_status_ready{namespace="__NAMESPACE__",pod=~"__FULLNAME__-worker-.*",container="worker-sidecar"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "SIE Worker {{ $labels.pod }} is down"
          description: "Worker pod {{ $labels.pod }} has been unreachable for 2 minutes."

      - alert: SIENoHealthyWorkers
        expr: (sum(kube_pod_container_status_ready{namespace="__NAMESPACE__",pod=~"__FULLNAME__-worker-.*",container="worker-sidecar"} == 1) or vector(0)) < 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "No healthy SIE workers"
          description: "All SIE worker pods are down. Requests will fail."

      - alert: SIEWorkerHighQueueDepth
        expr: |
          max by (pool, machine_profile, bundle) (
            sie_gateway_lane_queue_depth{namespace="__NAMESPACE__",service="__COLLECTOR_SERVICE__",endpoint="prometheus",producer_service="sie-gateway"}
            and on (producer_instance, collector_generation, pool, machine_profile, bundle)
            (
              abs(time() - sie_gateway_lane_queue_snapshot_timestamp_seconds{namespace="__NAMESPACE__",service="__COLLECTOR_SERVICE__",endpoint="prometheus",producer_service="sie-gateway"}) < 20
            )
          ) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High queue depth on {{ $labels.pool }}/{{ $labels.machine_profile }}/{{ $labels.bundle }}"
          description: "The fresh lane queue depth for {{ $labels.pool }}/{{ $labels.machine_profile }}/{{ $labels.bundle }} has been {{ $value }} for 5 minutes. Consider scaling up."

  # GPU alerts
  - name: sie-gpu-health
    rules:
      - alert: SIEGPUMemoryHigh
        expr: DCGM_FI_DEV_FB_USED{namespace="__NAMESPACE__",pod=~"__FULLNAME__-worker-.*"} / (DCGM_FI_DEV_FB_USED{namespace="__NAMESPACE__",pod=~"__FULLNAME__-worker-.*"} + DCGM_FI_DEV_FB_FREE{namespace="__NAMESPACE__",pod=~"__FULLNAME__-worker-.*"}) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU memory > 90% on {{ $labels.gpu }}"
          description: "GPU {{ $labels.gpu }} on {{ $labels.pod }} is at {{ $value | humanizePercentage }} memory."

      - alert: SIEGPUTemperatureHigh
        expr: DCGM_FI_DEV_GPU_TEMP{namespace="__NAMESPACE__",pod=~"__FULLNAME__-worker-.*"} > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU temperature > 80°C on {{ $labels.gpu }}"
          description: "GPU {{ $labels.gpu }} temperature is {{ $value }}°C. Check cooling."

      - alert: SIEGPUECCErrors
        expr: increase(DCGM_FI_DEV_ECC_DBE_VOL_TOTAL{namespace="__NAMESPACE__",pod=~"__FULLNAME__-worker-.*"}[1h]) > 0
        labels:
          severity: critical
        annotations:
          summary: "GPU ECC double-bit errors on {{ $labels.gpu }}"
          description: "GPU {{ $labels.gpu }} has uncorrectable ECC errors. Hardware issue likely."

  # Gateway alerts
  - name: sie-gateway-health
    rules:
      - alert: SIEGatewayDown
        expr: (sum(kube_pod_container_status_ready{namespace="__NAMESPACE__",pod=~"__FULLNAME__-gateway-.*",container="gateway"} == 1) or vector(0)) < 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SIE Gateway is down"
          description: "Gateway pod {{ $labels.pod }} is unreachable. Traffic cannot be routed."

      - alert: SIEHighErrorRate
        expr: |
          sum(rate(sie_gateway_requests_total{namespace="__NAMESPACE__",service="__COLLECTOR_SERVICE__",endpoint="prometheus",producer_service="sie-gateway",http_status_code=~"5.."}[5m]))
          / clamp_min(sum(rate(sie_gateway_requests_total{namespace="__NAMESPACE__",service="__COLLECTOR_SERVICE__",endpoint="prometheus",producer_service="sie-gateway"}[5m])), 1e-9) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SIE server error rate > 5%"
          description: "{{ $value | humanizePercentage }} of requests are returning 5xx responses."

      - alert: SIEHighLatency
        expr: histogram_quantile(0.95, sum by (le) (rate(sie_gateway_request_duration_seconds_bucket{namespace="__NAMESPACE__",service="__COLLECTOR_SERVICE__",endpoint="prometheus",producer_service="sie-gateway"}[5m]))) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SIE p95 latency > 5s"
          description: "95th percentile latency is {{ $value | humanizeDuration }}."

      - alert: SIEGenerationServerErrorSpike
        expr: |
          sum by (machine_profile) (
            rate(sie_gateway_requests_total{namespace="__NAMESPACE__",service="__COLLECTOR_SERVICE__",endpoint="prometheus",producer_service="sie-gateway",operation="generate",http_status_code=~"5.."}[5m])
          ) > 0.02
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SIE generation server errors on {{ $labels.machine_profile }}"
          description: "Generation requests are returning 5xx responses at {{ $value | humanize }} req/s. Correlate with worker model-load, OOM and generation telemetry."

      - alert: SIEModelLoadingRetrySpike
        expr: |
          sum by (lane, model, profile, outcome) (
            rate(sie_worker_model_load_duration_seconds_count{namespace="__NAMESPACE__",service="__COLLECTOR_SERVICE__",endpoint="prometheus",producer_service="sie-worker",outcome=~"error|timeout"}[5m])
          ) > 0.05
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "SIE model-load failures on {{ $labels.lane }} / {{ $labels.model }}"
          description: "Worker model loads are ending in {{ $labels.outcome }} at {{ $value | humanize }} events/s."

      - alert: SIEResourceExhaustedSpike
        expr: |
          sum by (lane, model, profile, strategy) (rate(sie_worker_oom_recoveries_total{namespace="__NAMESPACE__",service="__COLLECTOR_SERVICE__",endpoint="prometheus",producer_service="sie-worker",outcome="terminal"}[5m])) > 0.1
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "SIE workers exhausting OOM recovery"
          description: "Workers are exhausting OOM recovery at {{ $value | humanize }} events/s; capacity is constrained."

  # Config service alerts
  # sie-config runs as a singleton control plane (replicas=1, Recreate). While
  # the gateway tolerates a brief outage (cached config keeps routing working),
  # prolonged downtime blocks all POST /v1/configs/* writes cluster-wide.
  - name: sie-config-health
    rules:
      - alert: SIEConfigDown
        expr: (sum(kube_pod_container_status_ready{namespace="__NAMESPACE__",pod=~"__FULLNAME__-config-.*",container="config"} == 1) or vector(0)) < 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "SIE Config service is down"
          description: "sie-config pod {{ $labels.pod }} has been unreachable for 2 minutes. Config writes are blocked; gateways continue serving from cached state."

  # Provisioning alerts
  - name: sie-provisioning
    rules:
      - alert: SIEProvisioningStuck
        expr: |
          kube_pod_status_phase{namespace="__NAMESPACE__",pod=~"__FULLNAME__-.*",phase="Pending"} == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "SIE pod stuck in Pending"
          description: "Pod {{ $labels.pod }} has been Pending for 10 minutes. Check events for scheduling issues."

      - alert: SIEScaleUpFailed
        expr: |
          increase(kube_event_count{reason="FailedScheduling",involved_object_namespace="__NAMESPACE__",involved_object_name=~"__FULLNAME__-worker-.*"}[10m]) > 0
        labels:
          severity: warning
        annotations:
          summary: "SIE worker failed to schedule"
          description: "Worker pod failed to schedule. Likely insufficient GPU capacity."
