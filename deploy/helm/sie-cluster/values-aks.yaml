# Azure AKS specific values
fullnameOverride: sie

podLabels:
  azure.workload.identity/use: "true"

# Sub-charts shipped with this overlay
keda:
  install: true

kube-prometheus-stack:
  install: true
  # AKS manages its own control plane — disable control-plane monitors
  kubeApiServer:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  kubeEtcd:
    enabled: false

observability:
  logs:
    install: true

kubernetes-event-exporter:
  install: false

# Autoscaling via KEDA (queries Prometheus for scaling decisions)
# prometheusAddress is auto-derived when kube-prometheus-stack.install=true
autoscaling:
  enabled: true
  # 600s / 300s — survives transient idle gaps without churning nodes
  cooldownPeriod: 600
  scaleDownStabilization: 300

# Enable Prometheus scraping (required for KEDA autoscaling)
serviceMonitor:
  enabled: true
  labels:
    app.kubernetes.io/part-of: sie

# Azure machine profiles (extends base machineProfiles)
machineProfiles:
  # Azure Standard_NC4as_T4_v3 (NVIDIA T4)
  t4:
    gpuType: nvidia-t4
    machineType: Standard_NC4as_T4_v3
    spot: true
  # Azure Standard_NV6ads_A10_v5 (NVIDIA A10)
  a10:
    gpuType: nvidia-a10
    machineType: Standard_NV6ads_A10_v5
    spot: true

# Ingress via nginx-ingress
ingress:
  enabled: true
  className: nginx
  # TLS defaults to BYO (user-supplied kubernetes.io/tls Secret).
  # Three other modes are supported:
  #
  #   1) cert-manager + Let's Encrypt (external cert-manager install):
  #      hosts:
  #        - sie.example.com
  #      tlsConfig:
  #        enabled: true
  #        mode: cert-manager
  #        certManager:
  #          email: ops@example.com
  #
  #   2) self-signed (air-gapped / on-prem; bundles cert-manager — single-tenant clusters only):
  #      hosts:
  #        - sie.example.com
  #      tlsConfig:
  #        enabled: true
  #        mode: self-signed
  #      # And at the top level:
  #      # certManagerBundle:
  #      #   certManager:
  #      #     install: true
  #
  #   3) disabled (TLS terminated upstream of the Ingress):
  #      tlsConfig:
  #        enabled: false
  #        mode: disabled

gateway:
  # HA configuration
  replicas: 2
  # Force repull to get latest image
  image:
    pullPolicy: Always
  # Resources baseline
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"

# sie-config control plane (singleton by design — see chart values.yaml for
# the HA caveat). Mirroring the gateway's pullPolicy/resources so AKS installs
# are representative of a full sie-cluster deployment.
config:
  enabled: true
  image:
    pullPolicy: Always
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

workers:
  pools:
    # Azure Standard_NC4as_T4_v3 pool (NVIDIA T4)
    t4:
      enabled: true
      machineProfile: t4
      gpuType: t4
      # AKS GPU pools use taints; no cloud-specific node selector is required.
      nodeSelector: {}
      gpu:
        count: 1
        product: NVIDIA-T4
      resources:
        requests:
          cpu: "2"
          memory: "8Gi"
        limits:
          cpu: "4"
          memory: "16Gi"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      bundles:
        default:
          minReplicas: 0
          maxReplicas: 10

# ServiceAccount — Helm manages creation; Azure Workload Identity annotation
# must be injected at deploy time.
# NAMING CONTRACT: name must match the Azure module's sie_service_account_name
#   (default "sie-server") and namespace (default "sie").
# To inject the workload identity client ID at deploy time:
#   --set serviceAccount.annotations."azure\.workload\.identity/client-id"=<client-id>
# Note: The hf-token secret is NOT created by the Helm chart. It must be created
#   manually on new clusters before deploying.
# Bash (read -rsp is bash-only):
#   read -rsp "HF token: " HF_TOKEN; echo
#   kubectl create secret generic hf-token --from-literal=token="$HF_TOKEN" -n sie
#   unset HF_TOKEN
# Or create from a file (then remove the file): kubectl create secret generic hf-token --from-file=token=/path/to/token -n sie
serviceAccount:
  create: true
  name: "sie-server"
  labels:
    azure.workload.identity/use: "true"
  annotations: {}
  # azure.workload.identity/client-id: <client-id>  # inject via --set at deploy time

dcgm-exporter:
  # AKS GPU nodes use taints; no node selector required
  nodeSelector: {}
