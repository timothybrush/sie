{{- if .Values.serviceAccount.create }}
{{- /*
  NAMING CONTRACT: The KSA name (serviceAccount.name, default "sie-server") must match
  the Kubernetes service account referenced in Terraform's Workload Identity / IRSA binding.
    GKE: iam.gke.io/gcp-service-account annotation is injected via serviceAccount.annotations
         in the environment-specific values override (e.g., gcp/k8s/sie.tf).
    EKS: eks.amazonaws.com/role-arn annotation is injected via serviceAccount.annotations
         in values-aws.yaml or via --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=<ARN>.
    AKS: azure.workload.identity/client-id annotation is injected via serviceAccount.annotations
         and azure.workload.identity/use label via serviceAccount.labels / podLabels.
  If overriding serviceAccount.name, update the matching TF variable sie_service_account_name.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sie-cluster.serviceAccountName" . }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    {{- with .Values.serviceAccount.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
