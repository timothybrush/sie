{{- if eq (include "sie-cluster.otel.applicationPrometheusEnabled" .) "true" }}
{{- $intervalRaw := toString .Values.serviceMonitor.interval -}}
{{- $timeoutRaw := toString .Values.serviceMonitor.scrapeTimeout -}}
{{- if not (regexMatch "^[1-9][0-9]*s$" $intervalRaw) -}}
{{- fail "serviceMonitor.interval must be a positive whole-second duration such as 5s" -}}
{{- end -}}
{{- if not (regexMatch "^[1-9][0-9]*s$" $timeoutRaw) -}}
{{- fail "serviceMonitor.scrapeTimeout must be a positive whole-second duration such as 4s" -}}
{{- end -}}
{{- $intervalSeconds := int (trimSuffix "s" $intervalRaw) -}}
{{- $timeoutSeconds := int (trimSuffix "s" $timeoutRaw) -}}
{{- if gt $timeoutSeconds $intervalSeconds -}}
{{- fail "serviceMonitor.scrapeTimeout must be less than or equal to serviceMonitor.interval" -}}
{{- end -}}
{{- if and .Values.autoscaling.enabled (gt $intervalSeconds 5) -}}
{{- fail "autoscaling.enabled requires serviceMonitor.interval no slower than 5s" -}}
{{- end }}
# Applications emit canonical metrics once over OTLP. Prometheus scrapes only
# the collector's compatibility exporter; no application-local /metrics surface
# participates in dashboards, alerts, or KEDA. Any chart-managed application
# Prometheus consumer makes this monitor and the bundled collector mandatory,
# even when serviceMonitor.enabled is omitted.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "sie-cluster.fullname" . }}-otel-collector
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "sie-cluster.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: otel-collector
  namespaceSelector:
    matchNames:
      - {{ include "sie-cluster.namespace" . }}
  endpoints:
    - port: prometheus
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      path: /metrics
      # Scrape-target identity is authoritative. A producer must not be able to
      # overwrite namespace/service/endpoint/job/instance and make an unrelated
      # target eligible for KEDA. Explicit producer identity is authored inside
      # the collector before Prometheus normalization, never copied from the
      # producer-controllable exported_job/exported_instance compatibility labels.
      honorLabels: false
{{- end }}
