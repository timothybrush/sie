{{- $fullname := include "sie-cluster.fullname" . -}}
{{- $namespace := include "sie-cluster.namespace" . -}}
{{- $serviceAccountName := include "sie-cluster.keda.suffixedName" (dict "base" $fullname "suffix" "-keda-cleanup") -}}
{{- $jobName := include "sie-cluster.keda.suffixedName" (dict "base" $fullname "suffix" (printf "-keda-cleanup-%d" .Release.Revision)) -}}
{{- $hooks := "pre-delete" -}}
{{- if not .Values.autoscaling.enabled -}}
{{- /*
  pre-upgrade removes ScaledObjects while a bundled source KEDA controller is
  still present. A failed upgrade is repaired and retried forward; rollback is
  intentionally unsupported.
*/ -}}
{{- $hooks = "pre-upgrade,pre-delete" -}}
{{- end -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $serviceAccountName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: keda-cleanup
  annotations:
    helm.sh/hook: {{ $hooks | quote }}
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $serviceAccountName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: keda-cleanup
  annotations:
    helm.sh/hook: {{ $hooks | quote }}
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-10"
rules:
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $serviceAccountName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: keda-cleanup
  annotations:
    helm.sh/hook: {{ $hooks | quote }}
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-10"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $serviceAccountName }}
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ $namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: keda-cleanup
  annotations:
    helm.sh/hook: {{ $hooks | quote }}
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-5"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 180
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/component: keda-cleanup
    spec:
      serviceAccountName: {{ $serviceAccountName }}
      restartPolicy: Never
      containers:
        - name: cleanup
          image: {{ include "sie-cluster.keda.hookImage" . }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              NAMESPACE={{ $namespace | quote }}
              {{- include "sie-cluster.kubernetes.inClusterKubeconfig" . | nindent 14 }}
              MANAGED_SELECTOR='app.kubernetes.io/instance={{ .Release.Name }},app.kubernetes.io/part-of=sie,app.kubernetes.io/managed-by=Helm,sie.superlinked.com/scaler-managed=true,sie.superlinked.com/helm-namespace={{ .Release.Namespace }}'
              # Canonical 0.6.20 objects predate scaler-managed. Keep this
              # exact selector solely so a direct disable upgrade does not
              # leave the old HPA control path active.
              LEGACY_SELECTOR='app.kubernetes.io/name={{ include "sie-cluster.name" . }},app.kubernetes.io/instance={{ .Release.Name }},app.kubernetes.io/part-of=sie,app.kubernetes.io/managed-by=Helm,app.kubernetes.io/component in (worker,gateway),helm.sh/chart=sie-cluster-0.6.20,app.kubernetes.io/version=v0.6.20,!sie.superlinked.com/scaler-managed'
              if ! resources="$(kubectl api-resources --api-group=keda.sh 2>/dev/null)"; then
                echo "FAILED: Kubernetes API discovery failed before KEDA cleanup" >&2
                exit 1
              fi
              if ! printf '%s\n' "$resources" | grep -q '^scaledobjects'; then
                echo "KEDA API is absent; nothing to clean"
                exit 0
              fi
              for selector in "$MANAGED_SELECTOR" "$LEGACY_SELECTOR"; do
                kubectl delete scaledobjects -n "$NAMESPACE" -l "$selector" \
                  --ignore-not-found --wait=true
                if [ -n "$(kubectl get scaledobjects -n "$NAMESPACE" -l "$selector" -o name)" ]; then
                  echo "FAILED: release-owned ScaledObjects remain after cleanup" >&2
                  exit 1
                fi
              done
              echo "Release-owned KEDA ScaledObjects removed"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
