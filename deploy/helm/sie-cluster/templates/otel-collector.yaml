{{- /* An explicit tracing.endpoint points pods at an external backend, so the bundled collector is suppressed to avoid an orphaned Deployment/Service/ConfigMap. */ -}}
{{- if and .Values.observability.tracing.enabled .Values.observability.tracing.collector.install (not .Values.observability.tracing.endpoint) }}
{{- $fullname := include "sie-cluster.fullname" . }}
{{- $exp := include "sie-cluster.tracing.collectorExporterEndpoint" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-otel-collector
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"

    exporters:
    {{- if $exp }}
      otlp:
        endpoint: {{ $exp | quote }}
        tls:
          insecure: {{ .Values.observability.tracing.collector.exporterInsecure }}
    {{- else }}
      debug:
        verbosity: detailed
    {{- end }}

    service:
      pipelines:
        traces:
          receivers: [otlp]
    {{- if $exp }}
          exporters: [otlp]
    {{- else }}
          exporters: [debug]
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-otel-collector
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sie-cluster.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: otel-collector
  template:
    metadata:
      labels:
        {{- include "sie-cluster.labels" . | nindent 8 }}
        app.kubernetes.io/component: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: "{{ .Values.observability.tracing.collector.image.repository }}:{{ .Values.observability.tracing.collector.image.tag }}"
          args:
            - "--config=/etc/otel/collector.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          {{- with .Values.observability.tracing.collector.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ $fullname }}-otel-collector
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-otel-collector
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  selector:
    {{- include "sie-cluster.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
{{- end }}
