{{- if .Values.autoscaling.enabled }}
{{- $expectedScaledObjects := 1 -}}
{{- range $pool := .Values.workers.pools -}}
{{- if $pool.enabled -}}
{{- range $bundleCfg := $pool.bundles -}}
{{- if dig "enabled" true $bundleCfg -}}
{{- $expectedScaledObjects = add1 $expectedScaledObjects -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- $workerPollingInterval := max 1 (int .Values.autoscaling.pollingInterval) -}}
{{- $maxPollingInterval := max 30 $workerPollingInterval -}}
{{- $failureThreshold := 3 -}}
{{- $validationWindow := mul $maxPollingInterval $failureThreshold -}}
{{- $checkInterval := min 30 (max 5 $workerPollingInterval) -}}
{{- $timeout := add $validationWindow 180 -}}
{{- $activeDeadline := add $timeout 60 -}}
# RBAC must be at a lower weight than the Job so it is fully propagated before the pod starts.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sie-cluster.healthGate.scaledobject.serviceAccountName" . }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    app.kubernetes.io/name: sie-health-test
    app.kubernetes.io/component: scaledobject
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
    helm.sh/hook-weight: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-health-scaledobject-reader" (include "sie-cluster.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    app.kubernetes.io/name: sie-health-test
    app.kubernetes.io/component: scaledobject
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
    helm.sh/hook-weight: "2"
rules:
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-health-scaledobject-reader" (include "sie-cluster.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    app.kubernetes.io/name: sie-health-test
    app.kubernetes.io/component: scaledobject
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
    helm.sh/hook-weight: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-health-scaledobject-reader" (include "sie-cluster.fullname" .) | trunc 63 | trimSuffix "-" }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sie-cluster.healthGate.scaledobject.serviceAccountName" . }}
    namespace: {{ include "sie-cluster.namespace" . }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-health-scaledobject-%d" (include "sie-cluster.fullname" .) .Release.Revision | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    app.kubernetes.io/name: sie-health-test
    app.kubernetes.io/component: scaledobject
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "3"
spec:
  backoffLimit: 0
  # KEDA keeps trigger health in status without an observedGeneration. Wait a
  # complete failure window after the apply hook before accepting that status,
  # then retain three minutes for reconciliation/API retries.
  activeDeadlineSeconds: {{ $activeDeadline }}
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sie-health-test
        app.kubernetes.io/component: scaledobject
    spec:
      serviceAccountName: {{ include "sie-cluster.healthGate.scaledobject.serviceAccountName" . }}
      restartPolicy: Never
      containers:
        - name: test
          image: {{ include "sie-cluster.keda.hookImage" . }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              NAMESPACE="{{ include "sie-cluster.namespace" . }}"
              {{- include "sie-cluster.kubernetes.inClusterKubeconfig" . | nindent 14 }}
              EXPECTED_COUNT={{ $expectedScaledObjects }}
              SCALEDOBJECT_SELECTOR='app.kubernetes.io/instance={{ .Release.Name }},app.kubernetes.io/part-of=sie,app.kubernetes.io/managed-by=Helm,sie.superlinked.com/scaler-managed=true,sie.superlinked.com/scaler-revision={{ .Release.Revision }},sie.superlinked.com/helm-namespace={{ .Release.Namespace }}'
              HPA_SELECTOR='app.kubernetes.io/instance={{ .Release.Name }},app.kubernetes.io/part-of=sie,app.kubernetes.io/managed-by=Helm,sie.superlinked.com/scaler-managed=true,sie.superlinked.com/helm-namespace={{ .Release.Namespace }}'
              FAILURE_THRESHOLD={{ $failureThreshold }}
              VALIDATION_WINDOW={{ $validationWindow }}
              TIMEOUT={{ $timeout }}
              INTERVAL={{ $checkInterval }}
              SCALEDOBJECTS_FILE=/tmp/keda-scaledobjects.json
              HPAS_FILE=/tmp/keda-hpas.json
              echo "=== ScaledObject Health Test ==="

              # Ordinary kubectl resource reads use the projected in-cluster
              # service-account credentials. --chunk-size keeps API responses
              # bounded; the chart's 193-object cap keeps the combined client
              # result comfortably inside this Job's memory limit. The pinned
              # KEDA 2.14.1 does not propagate a ScaledObject label-only update
              # to an existing HPA. Select the desired ScaledObjects by this
              # Helm revision, select all HPAs owned by this release, and then
              # require the two name sets to match exactly. That proves KEDA
              # reconciled every desired HPA and removed every obsolete one
              # without relying on a label KEDA may legitimately leave stale.
              k8s_summary() {
                if ! kubectl get scaledobjects.keda.sh -n "$NAMESPACE" -l "$SCALEDOBJECT_SELECTOR" \
                  --chunk-size=32 --request-timeout=10s -o json > "$SCALEDOBJECTS_FILE"; then
                  echo "Kubernetes ScaledObject query failed" >&2
                  return 1
                fi
                if ! kubectl get horizontalpodautoscalers.autoscaling -n "$NAMESPACE" -l "$HPA_SELECTOR" \
                  --chunk-size=32 --request-timeout=10s -o json > "$HPAS_FILE"; then
                  echo "Kubernetes HPA query failed" >&2
                  return 1
                fi

                jq -n --slurpfile scaledobject_list "$SCALEDOBJECTS_FILE" --slurpfile hpa_list "$HPAS_FILE" '
                  ($scaledobject_list[0].items | map(
                    (.status.health // {}) as $health |
                    (.spec.triggers | to_entries | map("s\(.key)-\(.value.type)") | sort) as $expected_metrics |
                    (.status.externalMetricNames // [] | sort) as $observed_metrics |
                    (
                      ($observed_metrics == $expected_metrics) and
                      (($health | keys | sort) == $expected_metrics) and
                      ((.status.hpaName // "") != "")
                    ) as $status_reconciled |
                    {
                      name: .metadata.name,
                      hpa_name: (.status.hpaName // ""),
                      ready: any(.status.conditions[]?; .type == "Ready" and .status == "True"),
                      fallback: any(.status.conditions[]?; .type == "Fallback" and .status == "True"),
                      status_reconciled: $status_reconciled,
                      trigger_health_happy: (
                        $status_reconciled and
                        (($health | length) == (.spec.triggers | length)) and
                        all($health[]; .status == "Happy" and (.numberOfFailures // 0) == 0)
                      )
                    }
                  )) as $scaledobjects |
                  ($hpa_list[0].items | map({
                    name: .metadata.name,
                    scaledobject_name: (.metadata.labels["scaledobject.keda.sh/name"] // "")
                  })) as $hpas |
                  ($scaledobjects | map(.name) | sort) as $scaledobject_names |
                  ($hpas | map(.scaledobject_name) | sort) as $hpa_scaledobject_names |
                  ($hpas | map(.name) | sort) as $hpa_names |
                  ($scaledobjects | map(.hpa_name) | sort) as $scaledobject_hpa_names |
                  {
                    count: ($scaledobjects | length),
                    hpa_count: ($hpas | length),
                    ready: ([$scaledobjects[] | select(.ready)] | length),
                    fallback: ([$scaledobjects[] | select(.fallback)] | length),
                    status_reconciled: ([$scaledobjects[] | select(.status_reconciled)] | length),
                    healthy: ([$scaledobjects[] | select(.trigger_health_happy)] | length),
                    hpa_set_reconciled: (
                      ($hpas | length) == ($scaledobjects | length) and
                      all($hpas[]; .scaledobject_name != "") and
                      $hpa_scaledobject_names == $scaledobject_names and
                      $hpa_names == $scaledobject_hpa_names
                    ),
                    not_ready: ([$scaledobjects[] | select(.ready | not) | .name] | .[:10]),
                    fallback_names: ([$scaledobjects[] | select(.fallback) | .name] | .[:10]),
                    status_unreconciled: ([$scaledobjects[] | select(.status_reconciled | not) | .name] | .[:10]),
                    unhealthy: ([$scaledobjects[] | select(.trigger_health_happy | not) | .name] | .[:10]),
                    hpa_set_difference: ([
                      ($scaledobject_names - $hpa_scaledobject_names)[],
                      ($hpa_scaledobject_names - $scaledobject_names)[]
                    ] | .[:10])
                  }
                '
              }

              elapsed=0
              echo "Waiting ${VALIDATION_WINDOW}s (failureThreshold=${FAILURE_THRESHOLD}, max polling interval={{ $maxPollingInterval }}s) before accepting KEDA status"
              while [ "$elapsed" -lt "$VALIDATION_WINDOW" ]; do
                remaining=$((VALIDATION_WINDOW - elapsed))
                delay=$INTERVAL
                if [ "$delay" -gt "$remaining" ]; then
                  delay=$remaining
                fi
                sleep "$delay"
                elapsed=$((elapsed + delay))
              done

              while [ $elapsed -lt $TIMEOUT ]; do
                if ! summary=$(k8s_summary); then
                  echo "Waiting for the release ScaledObject API... (${elapsed}s/${TIMEOUT}s)"
                  sleep $INTERVAL
                  elapsed=$((elapsed + INTERVAL))
                  continue
                fi
                count=$(printf '%s' "$summary" | jq -r '.count')
                hpa_count=$(printf '%s' "$summary" | jq -r '.hpa_count')
                ready_count=$(printf '%s' "$summary" | jq -r '.ready')
                fallback_count=$(printf '%s' "$summary" | jq -r '.fallback')
                status_reconciled_count=$(printf '%s' "$summary" | jq -r '.status_reconciled')
                healthy_count=$(printf '%s' "$summary" | jq -r '.healthy')
                hpa_set_reconciled=$(printf '%s' "$summary" | jq -r '.hpa_set_reconciled')
                if [ "$count" -ne "$EXPECTED_COUNT" ] || [ "$hpa_count" -ne "$EXPECTED_COUNT" ]; then
                  echo "Waiting for release autoscalers: ScaledObjects=$count HPAs=$hpa_count expected=$EXPECTED_COUNT (${elapsed}s/${TIMEOUT}s)"
                  sleep $INTERVAL
                  elapsed=$((elapsed + INTERVAL))
                  continue
                fi
                if [ "$ready_count" -eq "$EXPECTED_COUNT" ] \
                  && [ "$status_reconciled_count" -eq "$EXPECTED_COUNT" ] \
                  && [ "$healthy_count" -eq "$EXPECTED_COUNT" ] \
                  && [ "$fallback_count" -eq "0" ] \
                  && [ "$hpa_set_reconciled" = "true" ]; then
                  echo "SUCCESS: All $EXPECTED_COUNT release ScaledObjects and controller-reconciled HPAs are current with trigger health Happy"
                  exit 0
                fi
                echo "Waiting for KEDA reconciliation: ready=$ready_count/$EXPECTED_COUNT status=$status_reconciled_count/$EXPECTED_COUNT healthy=$healthy_count/$EXPECTED_COUNT fallback=$fallback_count HPA-set-current=$hpa_set_reconciled (${elapsed}s/${TIMEOUT}s)"
                echo "Status sample: $summary"
                sleep $INTERVAL
                elapsed=$((elapsed + INTERVAL))
              done
              echo "FAILED: ScaledObjects and controller-reconciled HPAs did not become current, Ready, and trigger-healthy after a complete KEDA failure window"
              exit 1
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
{{- end }}
