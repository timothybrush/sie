apiVersion: v1
kind: Service
metadata:
  name: {{ include "sie-cluster.worker.serviceName" . }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.worker.labels" . | nindent 4 }}
spec:
  # Headless service for StatefulSet DNS resolution
  clusterIP: None
  ports:
    - name: http
      port: {{ .Values.workers.common.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.workers.common.workerSidecar.enabled }}
    - name: worker-metrics
      port: {{ .Values.workers.common.workerSidecar.metricsPort }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
  selector:
    {{- include "sie-cluster.worker.selectorLabels" . | nindent 4 }}
