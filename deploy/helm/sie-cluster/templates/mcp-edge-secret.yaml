{{- /* Chart-managed connector-secret Secret. Skipped when the operator points
       mcpEdge.existingSecretName at a Secret they manage out-of-band. */}}
{{- if and .Values.mcpEdge.enabled .Values.mcpEdge.connectorSecrets (not .Values.mcpEdge.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sie-cluster.mcpEdge.secretName" . }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.mcpEdge.labels" . | nindent 4 }}
type: Opaque
stringData:
  connector-secrets: {{ .Values.mcpEdge.connectorSecrets | quote }}
{{- end }}
