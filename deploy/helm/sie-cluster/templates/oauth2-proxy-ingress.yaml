{{- if and .Values.auth.enabled .Values.ingress.enabled }}
{{- $hosts := include "sie-cluster.ingress.hosts" . | fromJsonArray }}
{{- $tls := include "sie-cluster.ingressTlsConfig" . | fromYaml }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sie-cluster.oauth2Proxy.serviceName" . }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if and $tls.enabled $hosts }}
  tls:
    - hosts:
        {{- range $hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ $tls.secretName }}
  {{- end }}
  rules:
    {{- range (default (list "") $hosts) }}
    - {{- if . }}
      host: {{ . | quote }}
      {{- end }}
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ include "sie-cluster.oauth2Proxy.serviceName" $ }}
                port:
                  number: {{ $.Values.auth.oauth2Proxy.service.port }}
    {{- end }}
{{- end }}
