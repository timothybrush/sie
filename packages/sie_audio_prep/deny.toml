# cargo-deny policy for the public audio-preparation crate.
#
# Symphonia is consumed unmodified under MPL-2.0 file-level weak copyleft;
# the crate remains Apache-2.0 and documents its dependency licenses.

[graph]
all-features = true
no-default-features = false

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Ignore unpublished workspace helpers; audit every external dependency.
private = { ignore = true }
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
