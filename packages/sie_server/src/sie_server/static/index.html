<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SIE Server</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background:#050816; color:#e5e7eb; }
      .wrap { max-width: 860px; margin: 2rem auto; padding: 0 1.25rem; }
      header { display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom: 0.5rem; }
      h1 { font-size: 1.6rem; margin: 0; }
      p.sub { margin: 0.25rem 0 1.25rem; color:#9ca3af; }
      .pill { display:inline-flex; align-items:center; gap:0.4rem; padding:0.2rem 0.6rem; border-radius:999px; background:#022c22; color:#6ee7b7; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.08em; }
      .badge-dot { width:0.4rem; height:0.4rem; border-radius:999px; background:#22c55e; box-shadow:0 0 0 4px rgba(34,197,94,0.35); }
      .tabs { display:flex; gap:0.4rem; margin-bottom: 0.9rem; }
      .tab { padding:0.45rem 0.9rem; border-radius:0.6rem 0.6rem 0 0; background:#0b1220; color:#9ca3af; cursor:pointer; border:1px solid #1f2937; border-bottom:none; font-size:0.9rem; }
      .tab.active { background:#020617; color:#e5e7eb; }
      .panel { display:none; background:#020617; border:1px solid #1f2937; border-radius:0 0.75rem 0.75rem 0.75rem; padding:1.1rem; }
      .panel.active { display:block; }
      label { display:block; font-size:0.78rem; color:#9ca3af; margin:0.6rem 0 0.25rem; text-transform:uppercase; letter-spacing:0.05em; }
      input, textarea { width:100%; box-sizing:border-box; background:#0b1220; color:#e5e7eb; border:1px solid #1f2937; border-radius:0.5rem; padding:0.55rem 0.7rem; font-size:0.95rem; font-family:inherit; }
      textarea { resize:vertical; min-height:3.5rem; }
      button { margin-top:0.8rem; padding:0.55rem 1.1rem; border-radius:0.5rem; border:none; background:#2563eb; color:white; font-weight:600; cursor:pointer; font-size:0.95rem; }
      button:disabled { opacity:0.5; cursor:default; }
      .out { margin-top:1rem; padding:0.8rem; background:#0b1220; border:1px solid #1f2937; border-radius:0.5rem; white-space:pre-wrap; word-break:break-word; min-height:2.5rem; font-size:0.95rem; }
      .meta { margin-top:0.5rem; font-size:0.8rem; color:#6ee7b7; }
      .err { color:#fca5a5; }
      .links { margin-top:1.25rem; display:flex; flex-wrap:wrap; gap:1rem; }
      a { color:#93c5fd; text-decoration:none; font-size:0.88rem; }
      a:hover { text-decoration:underline; }
      .row { display:flex; gap:0.75rem; } .row > div { flex:1; }
      code { background:#111827; padding:0.1rem 0.3rem; border-radius:0.3rem; font-size:0.85em; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>SIE Server</h1>
        <span class="pill"><span class="badge-dot"></span><span id="status">running</span></span>
      </header>
      <p class="sub">One local OpenAI-compatible endpoint — embeddings, reranking, and generation. Try it below or point any OpenAI/Cohere client at <code>/v1</code>.</p>

      <div class="tabs" role="tablist" aria-label="Playground modes">
        <div class="tab active" data-tab="chat" role="tab" tabindex="0" aria-selected="true">Chat</div>
        <div class="tab" data-tab="embed" role="tab" tabindex="0" aria-selected="false">Embeddings</div>
        <div class="tab" data-tab="rerank" role="tab" tabindex="0" aria-selected="false">Rerank</div>
      </div>

      <div class="panel active" id="panel-chat">
        <label for="chat-model">Model</label>
        <input id="chat-model" value="Qwen/Qwen3.5-4B" />
        <label for="chat-input">Message</label>
        <textarea id="chat-input">Write one sentence about Apple Silicon.</textarea>
        <button id="chat-send">Send</button>
        <div class="out" id="chat-out"></div>
        <div class="meta" id="chat-meta"></div>
      </div>

      <div class="panel" id="panel-embed">
        <label for="embed-model">Model</label>
        <input id="embed-model" value="BAAI/bge-m3" />
        <label for="embed-input">Texts (one per line)</label>
        <textarea id="embed-input">hello world
apple silicon inference</textarea>
        <button id="embed-send">Embed</button>
        <div class="out" id="embed-out"></div>
        <div class="meta" id="embed-meta"></div>
      </div>

      <div class="panel" id="panel-rerank">
        <label for="rerank-model">Model</label>
        <input id="rerank-model" value="BAAI/bge-reranker-v2-m3" />
        <div class="row">
          <div><label for="rerank-query">Query</label><input id="rerank-query" value="apple silicon" /></div>
        </div>
        <label for="rerank-docs">Documents (one per line)</label>
        <textarea id="rerank-docs">M-series chips power Macs
the weather is nice today
Metal GPU inference on Apple</textarea>
        <button id="rerank-send">Rerank</button>
        <div class="out" id="rerank-out"></div>
        <div class="meta" id="rerank-meta"></div>
      </div>

      <div class="links">
        <a href="/docs">OpenAPI docs</a>
        <a href="/v1/models">List models</a>
        <a href="/healthz">/healthz</a>
        <a href="/readyz">/readyz</a>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const tabs = [...document.querySelectorAll(".tab")];
      const activateTab = (t) => {
        tabs.forEach((x) => { x.classList.remove("active"); x.setAttribute("aria-selected", "false"); });
        document.querySelectorAll(".panel").forEach((x) => x.classList.remove("active"));
        t.classList.add("active");
        t.setAttribute("aria-selected", "true");
        $("panel-" + t.dataset.tab).classList.add("active");
        t.focus();
      };
      tabs.forEach((t, i) => {
        t.onclick = () => activateTab(t);
        t.onkeydown = (e) => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); activateTab(t); }
          else if (e.key === "ArrowRight" || e.key === "ArrowLeft") {
            e.preventDefault();
            activateTab(tabs[(i + (e.key === "ArrowRight" ? 1 : -1) + tabs.length) % tabs.length]);
          }
        };
      });
      fetch("/readyz").then((r) => { $("status").textContent = r.ok ? "ready" : "loading"; }).catch(() => {});

      // Chat (streaming /v1/chat/completions)
      $("chat-send").onclick = async () => {
        const btn = $("chat-send"), out = $("chat-out"), meta = $("chat-meta");
        out.textContent = ""; out.classList.remove("err"); meta.textContent = ""; btn.disabled = true;
        const t0 = performance.now(); let ttft = null, toks = 0;
        try {
          const resp = await fetch("/v1/chat/completions", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model: $("chat-model").value, messages: [{ role: "user", content: $("chat-input").value }], max_tokens: 256, temperature: 0.7, stream: true, stream_options: { include_usage: true } }),
          });
          if (!resp.ok) { out.classList.add("err"); out.textContent = "HTTP " + resp.status + ": " + (await resp.text()); btn.disabled = false; return; }
          const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf = "";
          for (;;) {
            const { value, done } = await reader.read(); if (done) break;
            buf += dec.decode(value, { stream: true }); const lines = buf.split("\n"); buf = lines.pop();
            for (let line of lines) {
              line = line.trim(); if (!line.startsWith("data:")) continue; line = line.slice(5).trim();
              if (!line || line === "[DONE]") continue;
              let e; try { e = JSON.parse(line); } catch { continue; }
              const d = (e.choices && e.choices[0] && e.choices[0].delta) || {};
              if (d.content) { if (ttft === null) ttft = performance.now() - t0; toks++; out.textContent += d.content; }
              if (e.usage && e.usage.completion_tokens) toks = e.usage.completion_tokens;
            }
          }
          const dt = (performance.now() - t0) / 1000;
          meta.textContent = `${toks} tokens · ${(toks / dt).toFixed(1)} tok/s` + (ttft !== null ? ` · ttft ${ttft.toFixed(0)} ms` : "");
        } catch (err) { out.classList.add("err"); out.textContent = String(err); }
        btn.disabled = false;
      };

      // Embeddings
      $("embed-send").onclick = async () => {
        const btn = $("embed-send"), out = $("embed-out"), meta = $("embed-meta");
        out.textContent = "…"; out.classList.remove("err"); meta.textContent = ""; btn.disabled = true;
        const texts = $("embed-input").value.split("\n").map((s) => s.trim()).filter(Boolean);
        const t0 = performance.now();
        try {
          const resp = await fetch("/v1/embeddings", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: $("embed-model").value, input: texts }) });
          const data = await resp.json();
          if (!resp.ok) { out.classList.add("err"); out.textContent = JSON.stringify(data, null, 2); btn.disabled = false; return; }
          const dim = data.data[0].embedding.length;
          out.textContent = data.data.map((d, i) => `[${i}] dim=${dim}  [${d.embedding.slice(0, 6).map((x) => x.toFixed(4)).join(", ")}, …]`).join("\n");
          meta.textContent = `${data.data.length} vectors · ${((performance.now() - t0) / 1000).toFixed(2)}s`;
        } catch (err) { out.classList.add("err"); out.textContent = String(err); }
        btn.disabled = false;
      };

      // Rerank
      $("rerank-send").onclick = async () => {
        const btn = $("rerank-send"), out = $("rerank-out"), meta = $("rerank-meta");
        out.textContent = "…"; out.classList.remove("err"); meta.textContent = ""; btn.disabled = true;
        const docs = $("rerank-docs").value.split("\n").map((s) => s.trim()).filter(Boolean);
        const t0 = performance.now();
        try {
          const resp = await fetch("/v1/rerank", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: $("rerank-model").value, query: $("rerank-query").value, documents: docs, return_documents: true }) });
          const data = await resp.json();
          if (!resp.ok) { out.classList.add("err"); out.textContent = JSON.stringify(data, null, 2); btn.disabled = false; return; }
          out.textContent = data.results.map((r) => `${r.relevance_score.toFixed(4)}  ${(r.document && r.document.text) || "#" + r.index}`).join("\n");
          meta.textContent = `${data.results.length} ranked · ${((performance.now() - t0) / 1000).toFixed(2)}s`;
        } catch (err) { out.classList.add("err"); out.textContent = String(err); }
        btn.disabled = false;
      };
    </script>
  </body>
</html>
