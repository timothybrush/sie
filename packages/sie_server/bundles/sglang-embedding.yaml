name: sglang-embedding
priority: 21
adapters:
- sie_server.adapters.sglang.embedding
deps:
  # Lockstep with ``bundles/sglang.yaml``. The dependency stack is
  # identical (sglang's grammar backends are unavoidably pulled in even
  # on embedding-only deployments), and the bundle split exists only for
  # worker pool isolation. The previous revision pinned ``outlines-core``
  # (a transitive of ``outlines``) instead of the actual top-level deps
  # the generation bundle pins, which was both wrong and produced silent
  # pip resolution drift on environments that already had a different
  # ``outlines`` installed. Asserted in ``tests/test_bundles.py`` so a
  # future drift fails fast.
  sglang: '==0.5.10.post1'
  xgrammar: '==0.1.32'
  outlines: '==0.1.11'
  llguidance: '>=0.7.11,<0.8.0'
  # ``sglang==0.5.10.post1`` metadata requires ``flash-attn-4>=4.0.0b4`` —
  # a pre-release-only requirement. PyPI's ``flash-attn-4`` also publishes a
  # stable ``0.0.1`` placeholder, which disables uv's "allow pre-releases
  # when a package has nothing but pre-releases" rule, so a resolution that
  # only names ``sglang`` is unsatisfiable (nightly quality-adapter 7B lanes
  # died on this for weeks — #1684). Declaring the dep here with an explicit
  # pre-release specifier re-enables pre-releases for exactly this package.
  # Runtime-inert for us: sglang's default attention backend is flashinfer;
  # fa4 only needs to be importable to satisfy the dependency.
  flash-attn-4: '==4.0.0b19'
