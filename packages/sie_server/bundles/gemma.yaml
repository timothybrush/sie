name: gemma
priority: 20
default: false
# GPU platform this bundle targets — selects packages/sie_server/Dockerfile.cuda13
# and tags images ``cuda13-gemma`` (not ``cuda12-*``). Gemma 4 needs sglang
# 0.5.13 / torch 2.11 cu130 on a CUDA 13 devel runtime (see below). Read by the
# docker build task (tools/mise_tasks/docker_task.py) and mirrored by the release
# matrix (.github/release-matrix.json). Bundles without this field default to
# ``cuda12``.
platform: cuda13
# Dedicated worker image for Google Gemma 4 (see issue #1415).
#
# VALIDATED on a Modal L4 (driver 580.95.05 / CUDA 13.0) on 2026-06-18:
# google/gemma-4-E2B-it serves end-to-end on sglang 0.5.13 — the gemma4
# reasoning/tool parsers load, Gemma4ForConditionalGeneration loads weights,
# and /v1/chat/completions returns 200 (with --disable-cuda-graph, which the
# model configs set via adapter_options.loadtime.disable_cuda_graph).
#
# Kept SEPARATE from the `sglang` bundle so the Qwen3.x stack there stays on
# its sglang 0.5.10.post1 / torch 2.9.1 toolchain, untouched.
#
# VERSION NOTE: Gemma 4 first shipped in sglang 0.5.11, but 0.5.11's bundled
# JIT kernel (jit_kernel/csrc/elementwise/activation.cuh) fails to compile
# under strict nvcc — "select_kernel ... expected a type, got
# ActivationKind::kSiLU" — confirmed broken on BOTH CUDA 12.9 and 13.0. 0.5.13
# fixes it. Both 0.5.11 and 0.5.13 require torch 2.11 (the torch 2.9->2.11 bump
# landed at 0.5.11, not 0.5.12), so there is no torch-2.9 path to Gemma 4 —
# this bundle's image carries torch 2.11 (cu130) on a CUDA 13 base — built by
# the dedicated ``cuda13`` platform (packages/sie_server/Dockerfile.cuda13),
# selected via the ``platform: cuda13`` field above. The shared base venv still
# ships torch 2.9.1, so the gemma image carries two torches (~+3 GB); slimming
# torch out of sie-server core would remove that (tracked follow-up in #1415).
#
# The distinct adapter module (a thin SGLangGenerationAdapter subclass) scopes
# routing here: bundle compatibility keys on the adapter module path, so Gemma
# models reference `...sglang.gemma` and only this bundle declares it — Qwen3.x
# keep routing to `sglang`.
adapters:
- sie_server.adapters.sglang.gemma
deps:
  # sglang 0.5.13 = the validated Gemma 4 engine (0.5.11 has the activation.cuh
  # JIT bug above). Verified transitive resolution on the Modal L4 cu130 image:
  #   torch==2.11.0 (cu130), transformers==5.8.1, kernels==0.14.1,
  #   sglang-kernel + flashinfer-python (0.5.13 builds).
  # These resolve from the cu130 wheel indexes at build/serve time
  # (download.pytorch.org/whl/cu130 + https://docs.sglang.ai/whl/cu130/),
  # supplied by the build (Dockerfile.cuda13 / Modal image). torch,
  # transformers, and kernels are intentionally NOT re-pinned here — sglang
  # 0.5.13's own exact pins drive them. (Pinning kernels<0.13 makes the resolve
  # unsatisfiable: 0.5.13 requires kernels>=0.14.1,<0.15. sglang declares a
  # bare unpinned `kernels`, so without 0.5.13's transitive pin uv would grab
  # the latest, which breaks sglang's import — let sglang constrain it.)
  sglang: '==0.5.13'
  # Structured-output backend the Gemma model configs select
  # (tasks.generate ... grammar_backend: xgrammar). Pinned to the version
  # sglang 0.5.13 resolves, to prevent silent drift (mirrors the sglang
  # bundle's rationale). NOTE: 0.5.13 uses xgrammar 0.2.x, not the 0.1.32 the
  # sglang bundle pins for the older engine.
  xgrammar: '==0.2.1'
