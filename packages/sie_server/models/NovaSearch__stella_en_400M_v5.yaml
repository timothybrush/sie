sie_id: NovaSearch/stella_en_400M_v5
hf_id: NovaSearch/stella_en_400M_v5
inputs:
  text: true
  image: false
  audio: false
  video: false
tasks:
  encode:
    dense:
      dim: 1024
    sparse: null
    multivector: null
  score: null
  extract: null
max_sequence_length: 512
profiles:
  default:
    max_batch_tokens: 16384
    compute_precision: null
    adapter_path: sie_server.adapters.rope_flash:RoPEFlashAdapter
    adapter_options:
      loadtime:
        uses_legacy_transformers_cache: true
        config_kwargs:
          use_memory_efficient_attention: false
          unpad_inputs: false
      runtime:
        pooling: mean
        normalize: true
        query_template: |-
          Instruct: {instruction}
          Query: {text}
        default_instruction: Given a web search query, retrieve relevant passages that answer the query.
