sie_id: Alibaba-NLP/gte-Qwen2-1.5B-instruct
hf_id: Alibaba-NLP/gte-Qwen2-1.5B-instruct
hf_revision: a9af15a6372d7d6b25e9fb07c2ccb9e1fe645644
inputs:
  text: true
  image: false
  audio: false
  video: false
tasks:
  encode:
    dense:
      dim: 1536
    sparse: null
    multivector: null
  score: null
  extract: null
max_sequence_length: 32768
profiles:
  default:
    max_batch_tokens: 16384
    # The sentence_transformer adapter ignores compute_precision: the model
    # loads in its stored checkpoint dtype, which is float32 here (fp32
    # safetensors, config.json torch_dtype float32). The committed floors are
    # therefore fp32 self-measures — no higher-precision serving mode exists
    # to close the ~3.6% CosQA/CQADupstackPhysics gap vs the official
    # leaderboard numbers (#1625).
    compute_precision: null
    # gte-Qwen2 is a decoder converted to BIDIRECTIONAL attention (config
    # is_causal=false) with last-token pooling, served via its custom
    # trust_remote_code modeling. The qwen2_flash adapter reimplements the
    # forward with flash attention and cannot reproduce that recipe, collapsing
    # retrieval to near-random (#1593). Use the sentence_transformer adapter,
    # which runs the model's own forward + pooling (the official recipe).
    adapter_path: sie_server.adapters.sentence_transformer:SentenceTransformerDenseAdapter
    adapter_options:
      loadtime:
        trust_remote_code: true
        # gte-Qwen2's custom modeling uses the legacy (<4.54) transformers cache
        # API (DynamicCache.get_usable_length), removed in the bundle's newer
        # transformers. Disabling the KV cache skips that path (embeddings need
        # no cache); mirrors the old uses_legacy_transformers_cache workaround.
        config_kwargs:
          use_cache: false
      runtime:
        pooling: last
        normalize: true
        query_template: |-
          Instruct: {instruction}
          Query: {text}
        default_instruction: Given a web search query, retrieve relevant passages that answer the query
