sie_id: intfloat/multilingual-e5-large
hf_id: intfloat/multilingual-e5-large
inputs:
  text: true
  image: false
  audio: false
  video: false
tasks:
  encode:
    dense:
      dim: 1024
    sparse: null
    multivector: null
  score: null
  extract: null
max_sequence_length: 512
profiles:
  default:
    max_batch_tokens: 16384
    compute_precision: null
    adapter_path: sie_server.adapters.xlm_roberta_flash:XLMRobertaFlashAdapter
    adapter_options:
      loadtime: {}
      runtime:
        pooling: mean
        normalize: true
        query_template: 'query: {text}'
        doc_template: 'passage: {text}'
  sentence_transformer:
    extends: default
    adapter_path: sie_server.adapters.sentence_transformer:SentenceTransformerDenseAdapter
    adapter_options:
      loadtime:
        trust_remote_code: false
      runtime:
        pooling: mean
        normalize: true
  candle:
    extends: default
    adapter_path: sie_server_rust.adapters.candle:CandleEmbeddingAdapter
    adapter_options:
      runtime:
        pooling: mean
        normalize: true
        query_template: 'query: {text}'
        doc_template: 'passage: {text}'
