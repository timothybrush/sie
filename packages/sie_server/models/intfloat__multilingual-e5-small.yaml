sie_id: intfloat/multilingual-e5-small
hf_id: intfloat/multilingual-e5-small
inputs:
  text: true
  image: false
  audio: false
  video: false
tasks:
  encode:
    dense:
      dim: 384
    sparse: null
    multivector: null
  score: null
  extract: null
max_sequence_length: 512
profiles:
  default:
    max_batch_tokens: 16384
    compute_precision: null
    adapter_path: sie_server.adapters.bert_flash:BertFlashAdapter
    adapter_options:
      loadtime: {}
      runtime:
        pooling: mean
        normalize: true
        query_template: 'query: {text}'
        doc_template: 'passage: {text}'
