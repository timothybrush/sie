sie_id: Alibaba-NLP/gte-Qwen2-7B-instruct
hf_id: Alibaba-NLP/gte-Qwen2-7B-instruct
inputs:
  text: true
  image: false
  audio: false
  video: false
tasks:
  encode:
    dense:
      dim: 3584
    sparse: null
    multivector: null
  score: null
  extract: null
max_sequence_length: 32000
profiles:
  default:
    max_batch_tokens: 16384
    compute_precision: bfloat16
    adapter_path: sie_server.adapters.sglang.embedding:SGLangEmbeddingAdapter
    adapter_options:
      loadtime:
        mem_fraction_static: 0.85
        # The model's remote-code tokenizer only re-exports the stock Qwen2
        # tokenizer through a hardcoded transformers submodule import that is
        # fragile across transformers versions. sglang serves the weights with
        # its own native Qwen2 implementation (the config's remote auto_map is
        # only for HF AutoModel), so disable remote code and load the stock
        # tokenizer — functionally identical and version-robust.
        trust_remote_code: false
      runtime:
        pooling: last_token
        normalize: true
        query_template: |-
          Instruct: {instruction}
          Query: {text}
        default_instruction: Given a web search query, retrieve relevant passages that answer the query
