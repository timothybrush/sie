# NOTE: ``google/embeddinggemma-300m`` is a *gated* HuggingFace repo. The
# server requires ``HF_TOKEN`` (with the model license accepted on the
# HF account) to load this model. Without it, the registry records a
# terminal ``GATED`` failure and the API returns ``MODEL_LOAD_FAILED``
# (502, no Retry-After) so the SDK does not loop.
#
# Architecture support: needs ``transformers>=4.56`` for
# ``Gemma3TextModel``. Older versions raise an unsupported-model error
# which the registry classifies as ``DEPENDENCY``.
sie_id: google/embeddinggemma-300m
hf_id: google/embeddinggemma-300m
# Pinned to an immutable commit SHA (design §6.6): a served id maps to
# identical weights forever. ``main`` was mutable and did NOT guarantee
# bit-for-bit reproducibility; resolved 2026-07-05 via the HF metadata API.
# A weights change must be published as a NEW versioned id, not a re-pin
# under this id (re-verify against ``test_google_embeddinggemma_300m_dense``).
hf_revision: 57c266a740f537b4dc058e1b0cda161fd15afa75
inputs:
  text: true
  image: false
  audio: false
  video: false
tasks:
  encode:
    dense:
      dim: 768
    sparse: null
    multivector: null
  score: null
  extract: null
max_sequence_length: 2048
profiles:
  default:
    max_batch_tokens: 16384
    # EmbeddingGemma carries trained Dense projection layers on top of the
    # transformer (Transformer -> mean Pooling -> Dense -> Dense -> Normalize),
    # so it is served through the sentence-transformers pipeline; a plain
    # transformers.AutoModel path would expose only the backbone without the
    # projection head. Pooling and normalization are owned by the pipeline, and
    # query/document prompts come from the model's own prompt set selected by
    # is_query, so none are configured here.
    adapter_path: sie_server.adapters.sentence_transformer:SentenceTransformerDenseAdapter
