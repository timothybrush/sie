[package]
name = "sie-server-sidecar"
version = "0.6.23"
edition = "2021"
description = "SIE worker sidecar: NATS JetStream consumer, scheduler, IPC client, and GPU-independent prep for sie-server pods."

[lib]
name = "sie_server_sidecar"
path = "src/lib.rs"

[[bin]]
name = "sie-server-sidecar"
path = "src/main.rs"

[dependencies]
sie-audio-prep = { path = "../sie_audio_prep", version = "0.6.20", features = ["msgpack"] }
tokio = { version = "1", features = ["full"] }
async-nats = "0.49"
futures-util = "0.3"

serde = { version = "1", features = ["derive"] }
# `float_roundtrip` switches serde_json to its IEEE-754 correctly-rounded
# f64 parser. Required for bit-exact parity with the Python adaptive
# controller in `scripts/perf/replay-scheduler-trace.py` — without it,
# serde_json's default "fast" parser can be 1 ULP off for some decimals
# (e.g. "14.394267984578837" parses 1 bit low), which breaks the
# shadow-trace ULP diff. Do not drop this feature.
serde_json = { version = "1", features = ["float_roundtrip"] }
serde_bytes = "0.11"
half = "2"
rmp-serde = "1"
# Low-level msgpack writer. Used to emit byte-for-byte compatible
# `msgpack_numpy` sentinels on the result path so the Python SDK's
# `msgpack_numpy.patch()` decoder sees the same wire shape it gets
# from the Python adapters.
rmp = "0.8"
# Dynamically typed msgpack values for request payloads. User items may
# contain msgpack bin/ext fields (documents, images, numpy sentinels) that
# cannot round-trip through serde_json::Value.
rmpv = { version = "1", features = ["with-serde"] }
sha2 = "0.10"

clap = { version = "4", features = ["derive", "env"] }
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }

# OpenTelemetry tracing + canonical bounded metrics — versions kept in lockstep with the gateway
# (`packages/sie_gateway/Cargo.toml`). OTel breaks compat across minor
# versions, so bumping requires updating all four lines together.
# HTTP exporter support targets the managed Modal collector; trace context is
# still extracted directly from the work-envelope W3C strings.
opentelemetry = "0.32"
opentelemetry_sdk = { version = "0.32", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.32", default-features = false, features = [
    "grpc-tonic",
    "http-proto",
    "trace",
    "metrics",
    "reqwest-blocking-client",
    "reqwest-rustls",
    "tls-ring",
] }
tracing-opentelemetry = "0.33"

async-trait = "0.1"
bytes = "1"
uuid = { version = "1", features = ["v4"] }
reqwest = { version = "0.13", default-features = false, features = ["blocking", "json", "rustls"] }
rustls = { version = "0.23", default-features = false, features = ["ring"] }
rustix = { version = "1", features = ["fs"] }

# Liveness/readiness probe server. Metrics are push-only OTLP.
hyper = { version = "1", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"

# Cloud payload store backends (opt-in, same shape as gateway)
object_store = { version = "0.14", optional = true, features = ["aws", "gcp", "azure"] }
url = { version = "2", optional = true }

# HF fast-tokenizers. Used by `src/tokenize/` to verify the
# adapter-provided `tokenizer.json` materialised at the path
# `ModelDescriptor.tokenizer_path` and to tokenize inbound batches
# inside the sidecar. Blake3 hashes the canonical bytes
# for the `tokenizer_id` drift check the adapter populates on
# `EnsureModelReady`.
tokenizers = { version = "0.23", default-features = false, features = ["onig"] }
blake3 = "1"

# NOTE: This crate has no GPU-side dependencies. The sidecar talks to
# its inference backend strictly over IPC; in-process native backends
# (if reintroduced later) would land as a sibling crate, not here.

[features]
default = []
cloud-storage = ["dep:object_store", "dep:url"]

[dev-dependencies]
tempfile = "3"
# `testing` unlocks the in-memory exporter used to verify exact canonical metric
# names, types, units, and bounded attributes without a live collector.
opentelemetry_sdk = { version = "0.32", features = ["testing"] }
