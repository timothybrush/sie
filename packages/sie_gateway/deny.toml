# cargo-deny config for sie-gateway.
#
# Run with: `mise run gateway-deny`
# Docs:     https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true        # audit cloud-storage feature deps too
no-default-features = false

[advisories]
version = 2
yanked = "deny"
# Each ignored entry must carry a reason and an upstream-fix path. When
# the corresponding transitive bump lands (kube-rs, async-nats,
# prometheus), drop the entry — `cargo-deny` warns on unmatched ignores.
ignore = [
    # Two quick-xml 0.40.1 DoS advisories, both fixed in the breaking 0.41.0
    # release. quick-xml comes in only transitively via object_store 0.14.0
    # (latest), which pins quick-xml ^0.40.1, so there is no version to update
    # to yet, and it parses only trusted cloud-provider API responses, not
    # attacker-controlled XML. Drop both when object_store ships a release
    # depending on quick-xml >=0.41.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml <0.41 quadratic duplicate-attribute parse DoS (upstream #969); transitive via object_store 0.14.0 (pins ^0.40.1); awaiting upstream bump" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml <0.41 namespace-declaration allocation DoS (upstream #970); transitive via object_store 0.14.0 (pins ^0.40.1); awaiting upstream bump" },
]

[licenses]
version = 2
# sie-gateway itself is `publish = false`; skip license validation for
# the workspace crate, only audit external dependency licenses.
private = { ignore = true }
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
