[project]
name = "sie-mcp"
version = "0.1.0"
description = "SIE MCP edge - hosted MCP server exposing SIE document jobs (Req 12)"
requires-python = ">=3.12,<3.13"
license = { text = "Apache-2.0" }
dependencies = [
    "mcp>=1.9,<2",
    "sie-sdk>=0.1",
    "starlette>=1.3.1",
    "uvicorn[standard]>=0.32,<1",
    "typer>=0.14,<1",
    # Post-validation of cluster output against the requested schema. Already a
    # transitive dependency via ``mcp``; declared directly since we import it.
    "jsonschema>=4",
    # VL-OCR routing (#1307): rasterize scanned/complex PDF pages for the VL-OCR model.
    "pypdfium2>=5.6.0",
    "pillow>=12.2.0",
]

[project.scripts]
sie-mcp = "sie_mcp.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sie_mcp"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.0",
]
